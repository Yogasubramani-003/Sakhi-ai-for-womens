<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sakhi AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="52" height="68">
          <!-- Hair back -->
          <ellipse cx="30" cy="28" rx="16" ry="20" fill="#3d1f00"/>
          <!-- Two pigtails -->
          <ellipse cx="14" cy="38" rx="5" ry="12" fill="#3d1f00" transform="rotate(-15 14 38)"/>
          <ellipse cx="46" cy="38" rx="5" ry="12" fill="#3d1f00" transform="rotate(15 46 38)"/>
          <!-- Hair ribbons -->
          <circle cx="15" cy="26" r="4" fill="#ff69b4"/>
          <circle cx="45" cy="26" r="4" fill="#ff69b4"/>
          <!-- Face -->
          <circle cx="30" cy="26" r="14" fill="#fddbb4"/>
          <!-- Hair top -->
          <ellipse cx="30" cy="14" rx="14" ry="8" fill="#3d1f00"/>
          <!-- Eyes -->
          <ellipse cx="24" cy="25" rx="2.5" ry="3" fill="#1a0a00"/>
          <ellipse cx="36" cy="25" rx="2.5" ry="3" fill="#1a0a00"/>
          <!-- Eye shine -->
          <circle cx="25" cy="24" r="1" fill="white"/>
          <circle cx="37" cy="24" r="1" fill="white"/>
          <!-- Blush -->
          <ellipse cx="20" cy="30" rx="4" ry="2.5" fill="#ffb6c1" opacity="0.6"/>
          <ellipse cx="40" cy="30" rx="4" ry="2.5" fill="#ffb6c1" opacity="0.6"/>
          <!-- Smile -->
          <path d="M25 32 Q30 37 35 32" stroke="#c0392b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- Body / dress -->
          <path d="M14 58 Q16 44 30 44 Q44 44 46 58 L48 80 H12 Z" fill="#ff69b4"/>
          <!-- Dress collar -->
          <path d="M24 44 Q30 50 36 44" fill="#ff9ec4"/>
          <!-- Arms -->
          <path d="M14 50 Q6 52 8 60" stroke="#fddbb4" stroke-width="5" fill="none" stroke-linecap="round"/>
          <path d="M46 50 Q54 52 52 60" stroke="#fddbb4" stroke-width="5" fill="none" stroke-linecap="round"/>
          <!-- Legs -->
          <rect x="22" y="76" width="6" height="10" rx="3" fill="#fddbb4"/>
          <rect x="32" y="76" width="6" height="10" rx="3" fill="#fddbb4"/>
        </svg>
      </div>
      <div>
        <h1>Sakhi AI</h1>
        <p>Your personal women's health companion</p>
      </div>
    </div>

    <!-- Quick Topic Buttons -->
    <div class="topics">
      <button onclick="quickAsk('period tracking')">🩸 Period Tracking</button>
      <button onclick="quickAsk('period pain relief')">💊 Pain Relief</button>
      <button onclick="quickAsk('pregnancy nutrition')">🤰 Pregnancy Care</button>
      <button onclick="quickAsk('water intake')">💧 Water Intake</button>
      <button onclick="quickAsk('PCOS PCOD')">🔬 PCOD/PCOS</button>
      <button onclick="quickAsk('exercises and yoga')">🧘 Yoga & Exercise</button>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
      <div class="message bot">
        <div class="avatar">🌸</div>
        <div class="bubble">
          Hi there! 👋 I'm <strong>Sakhi AI</strong>, your personal women's health companion.<br/><br/>
          I can help you with period tracking, pain relief, pregnancy nutrition, water intake, PCOD/PCOS advice, and yoga exercises.<br/><br/>
          What would you like help with today? 😊
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your question here..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">Send ➤</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
